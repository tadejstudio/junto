<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportMeet – Live Story</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 2px #333;
    position: relative;
  }

  /* ── Full screen story ── */
  .story-screen {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Background image */
  .story-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .story-bg-placeholder {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  /* Dark gradient overlays */
  .overlay-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 220px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    pointer-events: none;
  }
  .overlay-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 300px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ── TOP UI ── */
  .story-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 52px 16px 0;
    z-index: 10;
  }

  /* Progress bars */
  .progress-bars {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
  }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.35);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
  }
  .progress-bar.done .progress-fill  { width: 100%; }
  .progress-bar.active .progress-fill {
    width: 60%;
    animation: progress-anim 4s linear forwards;
  }
  @keyframes progress-anim {
    from { width: 60%; }
    to   { width: 100%; }
  }

  /* Activity info row */
  .story-activity-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .story-activity-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .story-sport-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .story-activity-info {}
  .story-activity-name {
    font-size: 15px; font-weight: 700;
    color: #fff; line-height: 1.2;
  }
  .story-activity-meta {
    font-size: 12px; color: rgba(255,255,255,0.7);
    display: flex; align-items: center; gap: 6px;
    margin-top: 1px;
  }
  .live-pill {
    background: #FF3B30;
    color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .live-dot {
    width: 5px; height: 5px;
    background: #fff; border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.7); }
  }

  .story-close {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    cursor: pointer;
  }

  /* ── POSTER info (mid-left) ── */
  .story-poster {
    position: absolute;
    bottom: 230px; left: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }
  .poster-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 1.5px solid rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .poster-name {
    font-size: 13px; font-weight: 600;
    color: #fff;
  }
  .poster-time {
    font-size: 12px; color: rgba(255,255,255,0.6);
    margin-left: 4px;
  }

  /* ── BOTTOM UI ── */
  .story-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 16px 44px;
    z-index: 10;
  }

  /* Caption */
  .story-caption {
    font-size: 16px; font-weight: 500;
    color: #fff;
    margin-bottom: 20px;
    line-height: 1.4;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* Participants row */
  .story-participants {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .participants-avatars {
    display: flex;
  }
  .p-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    margin-left: -8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: #fff;
  }
  .p-avatar:first-child { margin-left: 0; }
  .p-avatar.a1 { background: #FF6B35; }
  .p-avatar.a2 { background: #4CAF50; }
  .p-avatar.a3 { background: #2196F3; }
  .participants-text {
    font-size: 13px; color: rgba(255,255,255,0.8);
    font-weight: 500;
  }
  .participants-text strong { color: #fff; }

  /* CTA button — tap to see activity */
  .story-cta {
    width: 100%;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 16px;
    padding: 15px;
    font-size: 16px; font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .story-cta .arrow {
    font-size: 18px;
    transition: transform 0.2s;
  }

  /* Tap zones (left / right to skip) */
  .tap-left {
    position: absolute;
    top: 100px; left: 0;
    width: 35%; height: 60%;
    z-index: 5;
    cursor: pointer;
  }
  .tap-right {
    position: absolute;
    top: 100px; right: 0;
    width: 35%; height: 60%;
    z-index: 5;
    cursor: pointer;
  }

  /* Swipe hint */
  .swipe-hint {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
    letter-spacing: 0.3px;
    z-index: 10;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="story-screen">

    <!-- Background photo -->
    <img class="story-bg" src="basketball.jpg" alt="Basketball"
         onerror="this.style.display='none'">
    <div class="story-bg-placeholder"></div>

    <!-- Gradients -->
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>

    <!-- Tap zones -->
    <div class="tap-left"></div>
    <div class="tap-right"></div>

    <!-- ── TOP ── -->
    <div class="story-top">
      <!-- Progress bars: 3 stories, 2nd active -->
      <div class="progress-bars">
        <div class="progress-bar done"><div class="progress-fill"></div></div>
        <div class="progress-bar active"><div class="progress-fill"></div></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>

      <!-- Activity info -->
      <div class="story-activity-row">
        <div class="story-activity-left">
          <div class="story-sport-icon">🏀</div>
          <div class="story-activity-info">
            <div class="story-activity-name">Košarka · BTC igrišče</div>
            <div class="story-activity-meta">
              <div class="live-pill"><div class="live-dot"></div>LIVE</div>
              <span>3 igrajo · 0.4 km</span>
            </div>
          </div>
        </div>
        <div class="story-close">✕</div>
      </div>
    </div>

    <!-- ── POSTER ── -->
    <div class="story-poster">
      <div class="poster-avatar">M</div>
      <span class="poster-name">Miha</span>
      <span class="poster-time">· 2 min</span>
    </div>

    <!-- ── BOTTOM ── -->
    <div class="story-bottom">

      <div class="story-caption">
        Kdo pride? Manjka še en 🏀🔥
      </div>

      <div class="story-participants">
        <div class="participants-avatars">
          <div class="p-avatar a1">M</div>
          <div class="p-avatar a2">J</div>
          <div class="p-avatar a3">T</div>
        </div>
        <div class="participants-text">
          <strong>Miha, Jan, Tomaž</strong> so tam
        </div>
      </div>

      <button class="story-cta">
        Poglej aktivnost &amp; chat <span class="arrow">→</span>
      </button>

    </div>

    <div class="swipe-hint">← swipe za naslednji story →</div>

  </div>
</div>
<script src="junto.js"></script>
<script>
// Story nima bottom nav — samo close gumb nazaj
document.querySelectorAll("[class*=close],[class*=back]").forEach(b=>b.addEventListener("click",()=>JUNTO.goBack()));
</script>
</body>
</html>
<script>
// Close gumb → nazaj
document.querySelector('.story-close')?.addEventListener('click', () => JUNTO.goBack());
// CTA gumb → activity
document.querySelector('.story-cta')?.addEventListener('click', () => JUNTO.goActivity());
</script>
