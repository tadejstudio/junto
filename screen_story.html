<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junto — Story</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;}
.device{width:390px;height:100vh;background:#000;position:relative;overflow:hidden;}

/* STORY BG */
.story-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.3s;}
.story-bg-color{position:absolute;inset:0;transition:background 0.3s;}

/* GRADIENTS */
.overlay-top{position:absolute;top:0;left:0;right:0;height:220px;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);pointer-events:none;z-index:5;}
.overlay-bottom{position:absolute;bottom:0;left:0;right:0;height:300px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);pointer-events:none;z-index:5;}

/* PROGRESS BARS */
.progress-bars{display:flex;gap:4px;padding:52px 12px 8px;position:relative;z-index:10;}
.progress-bar{flex:1;height:2.5px;background:rgba(255,255,255,0.35);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:none;}
.progress-fill.done{width:100%;}
.progress-fill.active{animation:none;}

/* HEADER */
.story-top{position:relative;z-index:10;}
.story-activity-row{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 10px;}
.story-activity-left{display:flex;align-items:center;gap:10px;}
.story-sport-icon{width:36px;height:36px;background:rgba(255,255,255,0.2);backdrop-filter:blur(6px);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.story-activity-name{font-size:14px;font-weight:700;color:#fff;}
.story-activity-meta{display:flex;align-items:center;gap:6px;margin-top:2px;}
.live-pill{background:rgba(255,59,48,0.85);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;display:flex;align-items:center;gap:4px;}
.live-pill-dot{width:5px;height:5px;background:#fff;border-radius:50%;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.story-meta-text{font-size:11px;color:rgba(255,255,255,0.7);}
.story-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:rgba(255,255,255,0.8);}

/* POSTER */
.story-poster{position:relative;z-index:10;display:flex;align-items:center;gap:8px;padding:0 14px 10px;}
.poster-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;border:1.5px solid rgba(255,255,255,0.5);}
.poster-name{font-size:13px;font-weight:600;color:#fff;}
.poster-time{font-size:12px;color:rgba(255,255,255,0.55);}

/* BOTTOM */
.story-bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 16px 36px;}
.story-caption{font-size:16px;font-weight:600;color:#fff;margin-bottom:14px;line-height:1.4;}
.story-participants{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.participants-avatars{display:flex;}
.p-av{width:28px;height:28px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-left:-8px;}
.p-av:first-child{margin-left:0;}
.participants-text{font-size:13px;color:rgba(255,255,255,0.8);}
.story-cta{width:100%;background:#fff;color:#111;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.story-cta.red{background:#FF385C;color:#fff;}
.story-cta-joined{width:100%;background:#34c759;color:#fff;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;}

/* TAP ZONES */
.tap-left{position:absolute;top:80px;left:0;width:35%;height:65%;z-index:20;cursor:pointer;}
.tap-right{position:absolute;top:80px;right:0;width:35%;height:65%;z-index:20;cursor:pointer;}

/* REPLY INPUT */
.story-reply{display:flex;align-items:center;gap:10px;margin-top:12px;}
.reply-input{flex:1;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.35);border-radius:22px;height:40px;padding:0 14px;font-size:14px;color:#fff;outline:none;font-family:inherit;backdrop-filter:blur(8px);}
.reply-input::placeholder{color:rgba(255,255,255,0.5);}
.reply-send{width:38px;height:38px;background:#FF385C;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;}

/* SWIPE HINT */
.swipe-hint{text-align:center;font-size:11px;color:rgba(255,255,255,0.35);margin-top:8px;}
</style>
</head>
<body>
<div class="device">
  <!-- BG -->
  <div class="story-bg-color" id="storyBg"></div>

  <!-- OVERLAYS -->
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>

  <!-- TAP ZONES -->
  <div class="tap-left" onclick="prevStory()"></div>
  <div class="tap-right" onclick="nextStory()"></div>

  <!-- TOP -->
  <div class="story-top">
    <div class="progress-bars" id="progressBars"></div>
    <div class="story-activity-row">
      <div class="story-activity-left">
        <div class="story-sport-icon" id="storyIcon"></div>
        <div>
          <div class="story-activity-name" id="storyTitle"></div>
          <div class="story-activity-meta">
            <div class="live-pill" id="livePill" style="display:none;"><div class="live-pill-dot"></div>LIVE</div>
            <span class="story-meta-text" id="storyMeta"></span>
          </div>
        </div>
      </div>
      <div class="story-close" onclick="location.href='screen_home.html'">✕</div>
    </div>
    <div class="story-poster">
      <div class="poster-avatar" id="posterAv"></div>
      <span class="poster-name" id="posterName"></span>
      <span class="poster-time" id="posterTime"></span>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="story-bottom">
    <div class="story-caption" id="storyCaption"></div>
    <div class="story-participants" id="storyParticipants" style="display:none;">
      <div class="participants-avatars" id="storyAvatars"></div>
      <div class="participants-text" id="storyParticipantsText"></div>
    </div>
    <div id="storyCta"></div>
    <div class="story-reply">
      <input class="reply-input" placeholder="Odgovori..." onkeydown="if(event.key==='Enter')sendReply(this)"/>
      <button class="reply-send" onclick="sendReply(this.previousElementSibling)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="swipe-hint">← tapni levo/desno za navigacijo →</div>
  </div>
</div>

<script>
var stories = [
  {
    bg: 'linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)',
    icon: '🏀', title: 'Košarka — BTC', live: true, meta: '3 igrajo · 0.4 km',
    poster: { av: 'M', name: 'Miha K.', time: '2 min' },
    caption: 'Kdo pride? Manjka še en 🏀🔥',
    participants: { avatars: [{l:'M',c:'#FF6B35'},{l:'J',c:'#4CAF50'},{l:'T',c:'#2196F3'}], text: 'Miha, Jan, Tomaž so tam' },
    cta: { type: 'activity', label: 'Poglej aktivnost & chat →' }
  },
  {
    bg: 'linear-gradient(160deg,#0d1b2a 0%,#1b3a4b 50%,#2d6a4f 100%)',
    icon: '🚴', title: 'Kolesarjenje — Rožnik', live: false, meta: 'Jutri 10:30 · 1.1 km',
    poster: { av: 'P', name: 'Petra V.', time: '15 min' },
    caption: 'Start jutri ob 10:30 — ~25km loop, vsi nivoji dobrodošli 🌲',
    participants: { avatars: [{l:'P',c:'#3cb371'},{l:'M',c:'#4a90d9'},{l:'J',c:'#c0a020'}], text: 'Petra, Matej, Jana gredo' },
    cta: { type: 'join', label: 'Pridruži se →' }
  },
  {
    bg: 'linear-gradient(160deg,#2d1b69 0%,#11998e 100%)',
    icon: '💪', title: 'Gym — Fitinn', live: false, meta: 'Danes 19:30 · 0.8 km',
    poster: { av: 'A', name: 'Anja V.', time: '30 min' },
    caption: 'Leg day done 🔥 kdo je se na gym?',
    participants: null,
    cta: { type: 'activity', label: 'Odpri aktivnost →' }
  }
];

var current = 0;
var timer = null;
var progress = 0;
var DURATION = 5000;
var TICK = 50;
var joined = false;

function init() {
  renderBars();
  showStory(0);
}

function renderBars() {
  var html = '';
  for (var i = 0; i < stories.length; i++) {
    html += '<div class="progress-bar"><div class="progress-fill" id="bar' + i + '"></div></div>';
  }
  document.getElementById('progressBars').innerHTML = html;
}

function showStory(idx) {
  if (idx < 0) { location.href = 'screen_home.html'; return; }
  if (idx >= stories.length) { location.href = 'screen_home.html'; return; }

  current = idx;
  var s = stories[idx];

  // BG
  document.getElementById('storyBg').style.background = s.bg;

  // Icon, title, meta
  document.getElementById('storyIcon').textContent = s.icon;
  document.getElementById('storyTitle').textContent = s.title;
  document.getElementById('storyMeta').textContent = s.meta;
  var livePill = document.getElementById('livePill');
  livePill.style.display = s.live ? 'flex' : 'none';

  // Poster
  document.getElementById('posterAv').textContent = s.poster.av;
  document.getElementById('posterName').textContent = s.poster.name;
  document.getElementById('posterTime').textContent = '· ' + s.poster.time;

  // Caption
  document.getElementById('storyCaption').textContent = s.caption;

  // Participants
  var partEl = document.getElementById('storyParticipants');
  if (s.participants) {
    var avHtml = '';
    for (var i = 0; i < s.participants.avatars.length; i++) {
      var a = s.participants.avatars[i];
      avHtml += '<div class="p-av" style="background:' + a.c + '">' + a.l + '</div>';
    }
    document.getElementById('storyAvatars').innerHTML = avHtml;
    document.getElementById('storyParticipantsText').textContent = s.participants.text;
    partEl.style.display = 'flex';
  } else {
    partEl.style.display = 'none';
  }

  // CTA
  var ctaEl = document.getElementById('storyCta');
  if (s.cta.type === 'join') {
    if (joined) {
      ctaEl.innerHTML = '<button class="story-cta-joined" onclick="location.href=\'screen_activity.html\'">✓ Pridružen — Odpri aktivnost</button>';
    } else {
      ctaEl.innerHTML = '<button class="story-cta red" onclick="handleJoin()">Pridruži se →</button>';
    }
  } else {
    ctaEl.innerHTML = '<button class="story-cta" onclick="location.href=\'screen_activity.html\'">' + s.cta.label + '</button>';
  }

  // Progress bars
  for (var j = 0; j < stories.length; j++) {
    var bar = document.getElementById('bar' + j);
    if (j < idx) { bar.style.width = '100%'; bar.style.transition = 'none'; }
    else if (j === idx) { bar.style.width = '0%'; bar.style.transition = 'none'; }
    else { bar.style.width = '0%'; bar.style.transition = 'none'; }
  }

  // Start timer
  startTimer();
}

function startTimer() {
  if (timer) clearInterval(timer);
  progress = 0;
  var bar = document.getElementById('bar' + current);
  timer = setInterval(function() {
    progress += TICK;
    var pct = Math.min(100, (progress / DURATION) * 100);
    bar.style.width = pct + '%';
    if (progress >= DURATION) {
      clearInterval(timer);
      nextStory();
    }
  }, TICK);
}

function nextStory() {
  if (timer) clearInterval(timer);
  var bar = document.getElementById('bar' + current);
  bar.style.width = '100%';
  showStory(current + 1);
}

function prevStory() {
  if (timer) clearInterval(timer);
  var bar = document.getElementById('bar' + current);
  bar.style.width = '0%';
  showStory(current - 1);
}

function handleJoin() {
  joined = true;
  var ctaEl = document.getElementById('storyCta');
  ctaEl.innerHTML = '<button class="story-cta-joined" onclick="location.href=\'screen_activity.html\'">✓ Pridružen — Odpri aktivnost</button>';
}

function sendReply(input) {
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  // Show quick toast
  var toast = document.createElement('div');
  toast.textContent = '✓ Odgovor poslan';
  toast.style.cssText = 'position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;z-index:999;';
  document.body.appendChild(toast);
  setTimeout(function() { document.body.removeChild(toast); }, 1800);
}

init();
</script>
</body>
</html>
